services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rate-limiter:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      REDIS_ADDR: redis:6379
      HTTP_ADDR: :8080
      METRICS_ADDR: :9090
      RATE_LIMIT_CAPACITY: 100
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
