# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
# Конфиг golangci-lint v2 (см. https://golangci-lint.run/docs/configuration/file/)

version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Все *_test.go: не требовать проверки возврата ошибок у errcheck (как в типичных тестах)
      - path: '(.+)_test\.go'
        linters:
          - errcheck
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/MTDpo/Rate_limiter
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
